[plugin]
enabled = true
config_version = "1.6.0"
config_path = "/MaiMBot/config/model_config.toml"
state_path = "data/router_state.json"
log_detail = true
health_penalty_seconds = 45
max_failover_attempts = 3
latency_weight = 1.0
cost_weight = 0.35
balance_weight = 0.65
auto_sync_providers = true
auto_switch_api_key_on_quota = true
auto_disable_model_when_all_keys_failed = false
auto_disable_on_errors = true
auto_disable_error_threshold = 3

[pools]
default = [{ name = "m1", enabled = false, disabled_reason = "HTTP 500 upstream broken", disabled_type = "general_error", disabled_at = 1780546666 }, { name = "m2", enabled = true }]

[providers]
default_balance_yuan = 9999.0
default_daily_budget_yuan = 9999.0
default_token_balance = 0
default_daily_token_budget = 0

[providers.overrides]
p1 = { enabled = true, api_keys = [], balance_yuan = 1, daily_budget_yuan = 1, weight = 1, billing_mode = "?????", price_per_call_yuan = 0, token_balance = 0, daily_token_budget = 0 }
