[plugin]
enabled = true
config_version = "1.7.0"
config_path = "/MaiMBot/config/model_config.toml"
state_path = "data/router_state.json"
log_detail = true
health_penalty_seconds = 45
max_failover_attempts = 3
latency_weight = 1.0
cost_weight = 0.35
balance_weight = 0.65
auto_sync_providers = true
auto_switch_api_key_on_quota = true
auto_disable_model_when_all_keys_failed = false
auto_disable_on_errors = true
auto_disable_error_threshold = 3

[pools]
default = [{ name = "m1", enabled = false, disabled_reason = "HTTP 500 upstream broken", disabled_type = "general_error", disabled_at = 1780551013 }, { name = "m2", enabled = true }]
timing_gate = [{ name = "gemini-3.1-flash-lite", enabled = true }, { name = "gemini-2.5-flash", enabled = true }]
planner = [{ name = "gemini-3.1-flash-lite", enabled = true }, { name = "gemini-3.1-pro", enabled = true }]
memory = [{ name = "gemini-3.1-flash-lite", enabled = true }, { name = "gemini-3.1-pro", enabled = true }, { name = "gpt-5.5", enabled = true }, { name = "gemini-3-flash-preview", enabled = true }, { name = "gemini-2.5-flash", enabled = true }]
mid_memory = [{ name = "gemini-3.1-flash-lite", enabled = true }, { name = "gemini-3.1-pro", enabled = true }, { name = "gemini-3-flash-preview", enabled = true }, { name = "gemini-2.5-flash", enabled = true }, { name = "gpt-5.5", enabled = true }]
replyer = [{ name = "deepseek-v4-flash11", enabled = true }, { name = "gemini-3.1-flash-lite", enabled = true }, { name = "gemini-3.1-pro", enabled = true }, { name = "gemini-2.5-flash", enabled = true }]
utils = [{ name = "gemini-3.1-flash-lite", enabled = true }, { name = "gemini-3.1-pro", enabled = true }]
learner = [{ name = "gemini-3.1-flash-lite", enabled = true }, { name = "gemini-3.1-pro", enabled = true }]
emoji = [{ name = "gemini-3.1-flash-lite", enabled = true }, { name = "gemini-2.5-flash", enabled = true }, { name = "deepseek-v4-flash11", enabled = true }]
vlm = [{ name = "gemini-3.1-flash-lite", enabled = true }, { name = "gemini-3.1-pro", enabled = true }]

[providers]
default_balance_yuan = 9999.0
default_daily_budget_yuan = 9999.0
default_token_balance = 0
default_daily_token_budget = 0

[providers.overrides]
p1 = { enabled = true, balance_yuan = 1.0, daily_budget_yuan = 1.0, weight = 1.0, billing_mode = "按模型价格", api_keys = ["sk-backup"], model_billing_overrides = [], price_per_call_yuan = 0.0, token_balance = 0, daily_token_budget = 0 }
