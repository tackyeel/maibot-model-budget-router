[plugin]
enabled = true
config_version = "1.4.0"
config_path = "/MaiMBot/config/model_config.toml"
state_path = "data/router_state.json"
log_detail = true
health_penalty_seconds = 45
max_failover_attempts = 3
latency_weight = 1.0
cost_weight = 0.35
balance_weight = 0.65
auto_sync_providers = true
auto_disable_on_429 = true
auto_disable_on_errors = true
auto_disable_error_threshold = 3

[pools]
default = [{ name = "gemini-2.5-flash", enabled = true }, { name = "deepseek-v3", enabled = true }]
timing_gate = [{ name = "gemini-2.5-flash", enabled = true }]
planner = [{ name = "gemini-2.5-flash", enabled = true }, { name = "deepseek-v3", enabled = true }]
memory = [{ name = "gemini-2.5-flash", enabled = true }, { name = "deepseek-v3", enabled = true }]
mid_memory = [{ name = "gemini-2.5-flash", enabled = true }, { name = "deepseek-v3", enabled = true }]
replyer = [{ name = "deepseek-v3", enabled = true }, { name = "gemini-2.5-flash", enabled = true }]
utils = [{ name = "gemini-2.5-flash", enabled = true }, { name = "deepseek-v3", enabled = true }]
learner = [{ name = "gemini-2.5-flash", enabled = true }, { name = "deepseek-v3", enabled = true }]
emoji = [{ name = "gemini-2.5-flash", enabled = true }]
vlm = [{ name = "gemini-2.5-flash", enabled = true }]

[providers]
default_balance_yuan = 9999.0
default_daily_budget_yuan = 9999.0
default_token_balance = 0
default_daily_token_budget = 0

[providers.overrides]
# Relay providers are auto-synced from MaiBot model_config.toml when
# auto_sync_providers is enabled. You can edit them in WebUI after install.
